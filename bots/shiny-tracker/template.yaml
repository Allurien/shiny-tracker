AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Shiny Tracker — Discord bot that monitors Diamond Art Club restocks

Parameters:
  DiscordToken:
    Type: String
    NoEcho: true
    Description: Discord bot token
  DiscordChannelId:
    Type: String
    Description: Discord channel ID for restock alerts
  DiscordPublicKey:
    Type: String
    Description: Discord application public key (for interaction signature verification)
  AppTableName:
    Type: String
    Default: ""
    Description: >
      ShinyBook app DynamoDB table name (separate stack — set this so the
      check function can read RESTOCK_SUB rows + wishlist paintings to fan out
      Expo Push notifications. Leave blank to disable app push fan-out.
  AppTableArn:
    Type: String
    Default: ""
    Description: >
      ARN of the app table referenced by AppTableName. Required when
      AppTableName is set so the IAM policy can scope cross-stack reads.

Conditions:
  EnableAppPush: !Not [!Equals [!Ref AppTableName, ""]]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        DISCORD_TOKEN: !Ref DiscordToken
        DISCORD_CHANNEL_ID: !Ref DiscordChannelId
        TABLE_NAME: !Ref TrackerTable
        APP_TABLE_NAME: !Ref AppTableName

Resources:
  # ---- DynamoDB ----
  TrackerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  # ---- Scheduled check Lambda (CloudWatch Events every 5 min) ----
  # Extra memory + timeout because this function launches headless Chromium
  # to scrape user wishlists when a restock is detected.
  # Uses default nodejs build (ships full node_modules) because chromium ships
  # binary assets that esbuild can't bundle. Cold start here doesn't matter —
  # only the interaction Lambda has the 3-second Discord deadline.
  CheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/check.handler
      Description: Scrapes DAC restocks page and sends alerts for new items
      MemorySize: 1536
      Timeout: 120
      Events:
        ScheduledCheck:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: true
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TrackerTable
        # Cross-stack read access to the app's DynamoDB so the check function
        # can find restock subscribers + their wishlist paintings. Skipped
        # entirely (no policy attached) when AppTableArn is blank.
        - !If
          - EnableAppPush
          - Statement:
              - Effect: Allow
                Action:
                  - "dynamodb:Scan"
                  - "dynamodb:Query"
                  - "dynamodb:GetItem"
                Resource:
                  - !Ref AppTableArn
                  - !Sub "${AppTableArn}/index/*"
          - !Ref AWS::NoValue

  # ---- Interaction handler Lambda (API Gateway for Discord webhook) ----
  # Bundled WITHOUT puppeteer/chromium so cold starts stay under Discord's
  # 3-second interaction response deadline. handlers/interaction.js is
  # deliberately written to not import lib/wishlist or lib/scraper, so esbuild
  # never pulls puppeteer or chromium into the bundle graph.
  InteractionFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: node20
        Sourcemap: false
        EntryPoints:
          - handlers/interaction.js
        External:
          - "@aws-sdk/*"
    Properties:
      Handler: interaction.handler
      Description: Handles Discord slash command interactions
      Environment:
        Variables:
          DISCORD_PUBLIC_KEY: !Ref DiscordPublicKey
      Events:
        DiscordInteraction:
          Type: HttpApi
          Properties:
            Path: /interactions
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TrackerTable

Outputs:
  InteractionsUrl:
    Description: Set this as your Discord Interactions Endpoint URL in the Developer Portal
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/interactions"
  TableName:
    Description: DynamoDB table name
    Value: !Ref TrackerTable
